<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=DotGothic16&display=swap');

  :root {
    --cream: #faf6ef;
    --ink: #2a2420;
    --tomato: #e85a4f;
    --tomato-dark: #c44237;
    --tomato-pale: #fce8e6;
    --leaf: #6b8e4e;
    --leaf-dark: #4a6b35;
    --leaf-pale: #ecf1e3;
    --mustard: #e8b84f;
    --sky: #88b8d4;
    --shadow: rgba(42, 36, 32, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body, html {
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    background: var(--cream);
  }

  .app-bg {
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 10%, rgba(232, 90, 79, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(107, 142, 78, 0.08) 0%, transparent 40%),
      var(--cream);
    padding: max(20px, env(safe-area-inset-top)) 16px max(120px, env(safe-area-inset-bottom));
    position: relative;
  }

  .app-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(42, 36, 32, 0.04) 1px, transparent 0);
    background-size: 20px 20px;
    pointer-events: none;
  }

  .container { max-width: 520px; margin: 0 auto; position: relative; z-index: 1; }

  /* ヘッダー */
  .header { text-align: center; margin-bottom: 16px; }
  .header-emoji {
    font-size: 42px;
    display: inline-block;
    transform: rotate(-6deg);
    filter: drop-shadow(2px 3px 0 var(--shadow));
  }
  .title { font-size: 22px; font-weight: 900; letter-spacing: 0.02em; margin-top: 2px; }
  .subtitle {
    font-family: 'DotGothic16', monospace;
    font-size: 11px;
    color: var(--leaf-dark);
    margin-top: 3px;
    letter-spacing: 0.12em;
  }

  /* 役割タブ */
  .role-switch {
    display: flex;
    gap: 6px;
    background: #fff;
    padding: 5px;
    border-radius: 999px;
    border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    margin-bottom: 18px;
  }
  .role-btn {
    flex: 1;
    padding: 10px 4px;
    border: none;
    background: transparent;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    border-radius: 999px;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .role-btn.active { background: var(--ink); color: var(--cream); }
  .role-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--ink);
  }
  .role-dot.tomato { background: var(--tomato); }
  .role-dot.leaf { background: var(--leaf); }
  .role-btn.active .role-dot { border-color: var(--cream); }

  /* ユーザーセレクタ */
  .user-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 8px 10px;
    margin-bottom: 14px;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .user-bar-label {
    font-size: 12px;
    font-family: 'DotGothic16', monospace;
    color: var(--leaf-dark);
  }
  .user-bar select {
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
  }
  .user-bar button {
    border: 1.5px solid var(--ink);
    background: var(--mustard);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }

  /* 同期インジケータ */
  .sync-indicator {
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    color: var(--leaf-dark);
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.1em;
    min-height: 14px;
  }
  .sync-indicator.err { color: var(--tomato-dark); }

  /* 通知許可バナー */
  .notif-banner {
    background: #fff8e6;
    border: 1.5px solid var(--mustard);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .notif-banner button {
    margin-left: auto;
    border: 1.5px solid var(--ink);
    background: var(--ink);
    color: var(--cream);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  /* アラート */
  .alert-card {
    background: var(--tomato);
    color: #fff;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 14px;
    text-align: center;
    animation: shake 0.6s ease-in-out;
  }
  .alert-card.urgent { background: var(--mustard); color: var(--ink); }
  .alert-card.info { background: var(--sky); color: var(--ink); }
  .alert-card.noprep { background: var(--mustard); color: var(--ink); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .alert-emoji { font-size: 28px; }
  .alert-title { font-size: 15px; font-weight: 900; margin: 4px 0; }
  .alert-text { font-size: 12px; opacity: 0.95; line-height: 1.5; }
  .alert-close {
    margin-top: 8px;
    padding: 5px 14px;
    background: #fff;
    color: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 999px;
    font-family: inherit;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
  }

  /* セクションタイトル */
  .section-title {
    font-size: 14px;
    font-weight: 700;
    margin: 16px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    width: 12px;
    height: 12px;
    background: var(--mustard);
    border: 2px solid var(--ink);
    border-radius: 3px;
    transform: rotate(-8deg);
  }

  /* カード共通 */
  .card {
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 16px;
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 14px;
  }

  .today-date {
    font-family: 'DotGothic16', monospace;
    font-size: 11px;
    color: var(--leaf-dark);
    letter-spacing: 0.12em;
  }
  .today-question { font-size: 18px; font-weight: 900; margin: 6px 0 12px; line-height: 1.4; }

  /* いる/いらない ボタン */
  .answer-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .answer-btn {
    padding: 18px 6px;
    border: 2px solid var(--ink);
    border-radius: 12px;
    font-family: inherit;
    font-weight: 900;
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    box-shadow: 3px 3px 0 var(--ink);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .answer-btn .emoji { font-size: 30px; }
  .answer-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

  /* 常時うっすら色付き、選択時にハッキリ */
  .answer-btn.yes { background: var(--leaf-pale); color: var(--leaf-dark); }
  .answer-btn.no { background: var(--tomato-pale); color: var(--tomato-dark); }
  .answer-btn.yes.selected { background: var(--leaf); color: #fff; border-color: var(--leaf-dark); }
  .answer-btn.no.selected { background: var(--tomato); color: #fff; border-color: var(--tomato-dark); }

  .save-btn {
    width: 100%;
    padding: 10px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
  }

  /* 緊急ボタン */
  .urgent-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: var(--mustard);
    border: 2px solid var(--ink);
    border-radius: 10px;
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .urgent-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

  /* 複数選択モードボタン */
  .bulk-mode-btn {
    width: 100%;
    padding: 10px;
    background: #fff;
    border: 2px dashed var(--ink);
    border-radius: 10px;
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    margin-bottom: 10px;
  }
  .bulk-mode-btn.on {
    background: var(--sky);
    border-style: solid;
    color: #fff;
  }

  /* カレンダー */
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .cal-nav {
    width: 30px;
    height: 30px;
    border: 2px solid var(--ink);
    background: var(--cream);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .cal-month { font-size: 15px; font-weight: 900; }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 5px;
  }
  .cal-weekday {
    text-align: center;
    font-family: 'DotGothic16', monospace;
    font-size: 10px;
    color: var(--leaf-dark);
    padding: 3px 0;
  }
  .cal-weekday.sun { color: var(--tomato-dark); }
  .cal-weekday.sat { color: var(--sky); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

  .cal-day {
    aspect-ratio: 1;
    border: 1.5px solid var(--ink);
    background: var(--cream);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    position: relative;
    transition: transform 0.1s;
  }
  .cal-day:active:not(.empty) { transform: scale(0.94); }
  .cal-day.empty { border: none; background: transparent; cursor: default; }
  .cal-day.past { opacity: 0.45; }
  .cal-day.today {
    border-width: 2.5px;
    box-shadow: 0 0 0 2px var(--mustard);
  }
  .cal-day.yes { background: var(--leaf); color: #fff; border-color: var(--leaf-dark); }
  .cal-day.no { background: var(--tomato); color: #fff; border-color: var(--tomato-dark); }
  .cal-day.bulk-selected {
    box-shadow: 0 0 0 3px var(--sky);
    transform: scale(0.95);
  }
  .cal-day .mark {
    position: absolute;
    bottom: 2px;
    font-size: 8px;
  }
  .cal-day .noprep-mark {
    position: absolute;
    top: 1px;
    left: 3px;
    font-size: 10px;
    font-weight: 900;
    color: var(--tomato-dark);
    line-height: 1;
  }
  .cal-day.yes .noprep-mark,
  .cal-day.no .noprep-mark { color: #fff; }

  /* 作れない日トグル */
  .noprep-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    background: var(--cream);
    border: 1.5px solid var(--ink);
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    user-select: none;
  }
  .noprep-toggle input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--tomato); }
  .noprep-toggle.on {
    background: var(--tomato);
    color: #fff;
    border-color: var(--tomato-dark);
  }

  /* 日付詳細モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(42, 36, 32, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--cream);
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 20px;
    max-width: 420px;
    width: 100%;
    box-shadow: 6px 6px 0 var(--ink);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .modal-title { font-size: 16px; font-weight: 900; }
  .modal-close {
    border: 2px solid var(--ink);
    background: #fff;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  .msg-author {
    font-size: 10px;
    color: var(--leaf-dark);
    margin-top: 4px;
  }

  /* 14日間予定 */
  .schedule-list { display: flex; flex-direction: column; gap: 8px; }
  .schedule-item {
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 10px;
    padding: 10px 12px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: center;
  }
  .schedule-item.today { background: #fff8e6; border-width: 2px; }
  .schedule-item.yes { border-left: 6px solid var(--leaf); }
  .schedule-item.no { border-left: 6px solid var(--tomato); }
  .schedule-item.empty { border-left: 6px solid #ccc; opacity: 0.7; }
  .schedule-item.noprep {
    border-left: 6px solid var(--tomato-dark) !important;
    background: #fce8e6 !important;
  }
  .schedule-date {
    font-family: 'DotGothic16', monospace;
    font-size: 12px;
    line-height: 1.3;
    text-align: center;
  }
  .schedule-date .day { font-size: 18px; font-weight: 900; color: var(--ink); }
  .schedule-content { font-size: 13px; }
  .schedule-status { font-size: 12px; font-weight: 700; }
  .schedule-status.yes { color: var(--leaf-dark); }
  .schedule-status.no { color: var(--tomato-dark); }
  .schedule-status.empty { color: #999; }
  .schedule-noprep-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--tomato-dark);
    margin-top: 2px;
  }

  .hidden { display: none !important; }

  /* 複数選択アクションバー */
  .bulk-action-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--ink);
    color: var(--cream);
    padding: 14px max(16px, env(safe-area-inset-left)) max(14px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-right));
    z-index: 50;
    box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
    transform: translateY(100%);
    transition: transform 0.3s;
  }
  .bulk-action-bar.show { transform: translateY(0); }
  .bulk-action-count {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    text-align: center;
  }
  .bulk-action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px;
  }
  .bulk-action-buttons button {
    padding: 10px;
    border: 2px solid var(--cream);
    border-radius: 8px;
    background: transparent;
    color: var(--cream);
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  .bulk-action-buttons button.primary-yes { background: var(--leaf); border-color: var(--leaf); }
  .bulk-action-buttons button.primary-no { background: var(--tomato); border-color: var(--tomato); }
  .bulk-action-buttons button.primary-noprep { background: var(--tomato-dark); border-color: var(--tomato-dark); }
  .bulk-action-buttons button.primary-available { background: var(--leaf); border-color: var(--leaf); }
  .bulk-action-buttons button.cancel { background: transparent; }

  /* トースト */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
    transition: transform 0.3s;
    z-index: 200;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  textarea, input[type="text"] {
    width: 100%;
    border: 1.5px solid var(--ink);
    border-radius: 8px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    background: var(--cream);
    color: var(--ink);
    resize: vertical;
    margin-bottom: 8px;
  }
  textarea:focus, input[type="text"]:focus {
    outline: none;
    background: #fff;
    border-color: var(--tomato);
  }
  .memo-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--leaf-dark);
    margin-bottom: 4px;
    display: block;
  }
</style>
</head>
<body>
<div class="app-bg">
  <div class="container">

    <!-- ヘッダー -->
    <div class="header">
      <div class="header-emoji">🍚</div>
      <div class="title">今日の晩ごはん、いる?</div>
      <div class="subtitle">DINNER CHECK APP</div>
    </div>

    <!-- 同期状態 -->
    <div class="sync-indicator" id="syncIndicator">読み込み中…</div>

    <!-- 通知許可バナー -->
    <div class="notif-banner hidden" id="notifBanner">
      <span>🔔 通知を有効にすると、家族からの更新が届きます</span>
      <button onclick="requestNotifPermission()">許可する</button>
    </div>

    <!-- ユーザー切り替え -->
    <div class="user-bar">
      <span class="user-bar-label">👤</span>
      <select id="userSelect"></select>
      <button onclick="openUserManage()">管理</button>
    </div>

    <!-- 役割タブ -->
    <div class="role-switch">
      <button class="role-btn active" data-role="child" onclick="switchRole('child')">
        <span class="role-dot tomato"></span>メイ
      </button>
      <button class="role-btn" data-role="parent" onclick="switchRole('parent')">
        <span class="role-dot leaf"></span>ちっち
      </button>
    </div>

    <!-- アラート表示エリア -->
    <div id="alertArea"></div>

    <!-- ===== メイ画面 ===== -->
    <div id="childView">
      <!-- 今日のカード -->
      <div class="card">
        <div class="today-date" id="todayDate"></div>
        <div class="today-question">きょうの晩ごはん、いる?</div>
        <div class="answer-buttons">
          <button class="answer-btn yes" data-answer="yes" onclick="selectAnswer('yes')">
            <span class="emoji">🍽️</span>
            <span>いる</span>
          </button>
          <button class="answer-btn no" data-answer="no" onclick="selectAnswer('no')">
            <span class="emoji">🙅</span>
            <span>いらない</span>
          </button>
        </div>
        <button class="urgent-btn" onclick="sendUrgentCancel()">⚡ 緊急!やっぱりいらない連絡</button>
      </div>

      <!-- 複数選択モードボタン -->
      <button class="bulk-mode-btn" id="childBulkBtn" onclick="toggleBulkMode('child')">📝 複数日まとめて入力</button>

      <!-- カレンダー -->
      <div class="section-title">これからの予定</div>
      <div class="card">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <div class="cal-month" id="calMonth"></div>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-weekdays">
          <div class="cal-weekday sun">日</div>
          <div class="cal-weekday">月</div>
          <div class="cal-weekday">火</div>
          <div class="cal-weekday">水</div>
          <div class="cal-weekday">木</div>
          <div class="cal-weekday">金</div>
          <div class="cal-weekday sat">土</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <!-- ===== ちっち画面 ===== -->
    <div id="parentView" class="hidden">
      <!-- 今日の状況 -->
      <div class="section-title">今日の状況</div>
      <div class="card" id="parentTodayCard"></div>

      <!-- 今日の作れないトグル -->
      <div class="card">
        <label class="noprep-toggle" id="todayNoprepToggle">
          <input type="checkbox" id="todayNoprepCheck" onchange="onTodayNoprepChange(event)">
          <span>🍳 今日は作れない日にする</span>
        </label>
      </div>

      <!-- 複数選択モードボタン (親側) -->
      <button class="bulk-mode-btn" id="parentBulkBtn" onclick="toggleBulkMode('parent')">📝 複数日まとめて指定</button>

      <!-- 親用カレンダー -->
      <div class="section-title">予定カレンダー</div>
      <div class="card">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
          <div class="cal-month" id="calMonthParent"></div>
          <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-weekdays">
          <div class="cal-weekday sun">日</div>
          <div class="cal-weekday">月</div>
          <div class="cal-weekday">火</div>
          <div class="cal-weekday">水</div>
          <div class="cal-weekday">木</div>
          <div class="cal-weekday">金</div>
          <div class="cal-weekday sat">土</div>
        </div>
        <div class="cal-grid" id="calGridParent"></div>
      </div>

      <!-- これからの予定一覧 -->
      <div class="section-title">これからの予定(14日間)</div>
      <div class="schedule-list" id="scheduleList"></div>
    </div>

  </div>
</div>

<!-- 日付詳細モーダル -->
<div class="modal-overlay" id="dayModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalDate"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ユーザー管理モーダル -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">家族メンバー管理</div>
      <button class="modal-close" onclick="closeUserModal()">✕</button>
    </div>
    <div id="userList"></div>
    <label class="memo-label" style="margin-top:12px;">新しいメンバーを追加</label>
    <input type="text" id="newUserInput" placeholder="例: お母さん">
    <button class="save-btn" onclick="addUser()">追加する</button>
  </div>
</div>

<!-- 複数選択アクションバー -->
<div class="bulk-action-bar" id="bulkBar">
  <div class="bulk-action-count" id="bulkCount">0日選択中</div>
  <div class="bulk-action-buttons" id="bulkButtons"></div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ===== 状態管理 =====
let state = {
  users: [],
  currentUserId: null,
  role: 'child',
  schedule: {},
  parentMemo: {},
  urgentCancels: [],
  tokens: {},           // userId → FCM device token
  calView: new Date(),
  bulkMode: null,       // null | 'child' | 'parent'
  bulkSelected: new Set(),
  _initialLoaded: false
};

// ===== Firestore ストレージ =====
function setSyncStatus(msg, isError = false) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  el.textContent = msg;
  el.classList.toggle('err', isError);
}

function waitForFirebase() {
  return new Promise((resolve) => {
    if (window.__fb) return resolve();
    window.addEventListener('firebase-ready', () => resolve(), { once: true });
  });
}

async function loadState() {
  try {
    await waitForFirebase();
    const { stateDoc, getDoc } = window.__fb;
    const snap = await getDoc(stateDoc);
    if (snap.exists()) {
      const data = snap.data();
      state.users = data.users || [];
      state.schedule = data.schedule || {};
      state.parentMemo = data.parentMemo || {};
      state.urgentCancels = data.urgentCancels || [];
      state.tokens = data.tokens || {};
    }
    setSyncStatus('☁ 同期OK ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}));
  } catch (e) {
    setSyncStatus('⚠ オフライン', true);
    throw e;
  }
  try {
    const u = localStorage.getItem('dinner_current_user');
    if (u) state.currentUserId = u;
  } catch(e) {}
}

async function saveState() {
  const data = {
    users: state.users,
    schedule: state.schedule,
    parentMemo: state.parentMemo,
    urgentCancels: state.urgentCancels,
    tokens: state.tokens,
    updatedAt: Date.now()
  };
  try {
    await waitForFirebase();
    const { stateDoc, setDoc } = window.__fb;
    await setDoc(stateDoc, data);
    setSyncStatus('☁ 同期OK ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('⚠ 保存失敗(ネット確認)', true);
    showToast('保存エラー: ' + e.message);
  }
}

function saveCurrentUser() {
  try { localStorage.setItem('dinner_current_user', state.currentUserId); } catch(e) {}
}

// ===== ユーティリティ =====
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function todayStr() { return fmtDate(new Date()); }
function getCurrentUser() { return state.users.find(u => u.id === state.currentUserId); }
function getUserName(id) {
  const u = state.users.find(x => x.id === id);
  return u ? u.name : '不明';
}
function uuid() { return 'u_' + Math.random().toString(36).slice(2,10); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== 初期化 =====
async function init() {
  try { await loadState(); } catch(e) {}

  // 初期ユーザー（固定名で作成）
  if (state.users.length === 0) {
    state.users = [
      { id: uuid(), name: 'メイ', role: 'child' },
      { id: uuid(), name: 'ちっち', role: 'parent' }
    ];
    state.currentUserId = state.users[0].id;
    await saveState();
    saveCurrentUser();
  } else {
    // マイグレーション: 旧ユーザー名・role未設定を補正
    let migrated = false;
    state.users.forEach(u => {
      if (!u.role) {
        if (u.name === '娘' || u.name === 'メイ') { u.name = 'メイ'; u.role = 'child'; migrated = true; }
        else if (u.name === 'お母さん' || u.name === 'お父さん' || u.name === 'ちっち' || u.name === '父' || u.name === '母') { u.name = 'ちっち'; u.role = 'parent'; migrated = true; }
      }
    });
    if (migrated) await saveState();
  }
  if (!state.currentUserId || !state.users.find(u => u.id === state.currentUserId)) {
    state.currentUserId = state.users[0].id;
    saveCurrentUser();
  }

  state._initialLoaded = true;
  renderUserSelect();
  renderAll();
  updateNotifBanner();
}

function renderUserSelect() {
  const sel = document.getElementById('userSelect');
  sel.innerHTML = '';
  state.users.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = u.name;
    if (u.id === state.currentUserId) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.onchange = () => {
    state.currentUserId = sel.value;
    saveCurrentUser();
    renderAll();
    updateNotifBanner();
  };
}

function renderAll() {
  renderAlerts();
  if (state.role === 'child') {
    document.getElementById('childView').classList.remove('hidden');
    document.getElementById('parentView').classList.add('hidden');
    renderTodayCard();
    renderCalendar('child');
  } else {
    document.getElementById('childView').classList.add('hidden');
    document.getElementById('parentView').classList.remove('hidden');
    renderParentView();
    renderCalendar('parent');
  }
  updateBulkBar();
}

function switchRole(role) {
  state.role = role;
  // 役割切替時は複数選択モードを解除
  if (state.bulkMode) {
    state.bulkMode = null;
    state.bulkSelected.clear();
    document.getElementById('childBulkBtn')?.classList.remove('on');
    document.getElementById('parentBulkBtn')?.classList.remove('on');
  }
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.role === role);
  });
  renderAll();
}

// ===== アラート =====
function renderAlerts() {
  const area = document.getElementById('alertArea');
  area.innerHTML = '';
  const now = new Date();
  const hour = now.getHours();
  const today = todayStr();

  if (state.role === 'child' && hour >= 11 && !state.schedule[today]) {
    area.innerHTML += `
      <div class="alert-card">
        <div class="alert-emoji">⏰</div>
        <div class="alert-title">まだ回答してないよ!</div>
        <div class="alert-text">今日の晩ごはん、いるかいらないか<br>教えてね</div>
      </div>`;
  }

  if (state.role === 'child') {
    const pmToday = state.parentMemo[today];
    if (pmToday && pmToday.unavailable) {
      area.innerHTML += `
        <div class="alert-card noprep">
          <div class="alert-emoji">🍳</div>
          <div class="alert-title">今日はちっちが作れない日だよ!</div>
          <div class="alert-text">晩ごはんを自分で用意してね</div>
        </div>`;
    }
  }

  if (state.role === 'parent') {
    const unseen = state.urgentCancels.filter(u => !u.seen);
    unseen.forEach(u => {
      const when = new Date(u.at);
      const timeStr = `${when.getHours()}:${String(when.getMinutes()).padStart(2,'0')}`;
      area.innerHTML += `
        <div class="alert-card urgent">
          <div class="alert-emoji">⚡</div>
          <div class="alert-title">緊急!今日の晩ごはんいらない連絡</div>
          <div class="alert-text">${getUserName(u.author)}さんから ${timeStr} に連絡</div>
          <button class="alert-close" onclick="markUrgentSeen('${u.at}')">確認した</button>
        </div>`;
    });
    if (hour >= 11 && !state.schedule[today]) {
      area.innerHTML += `
        <div class="alert-card info">
          <div class="alert-emoji">❓</div>
          <div class="alert-title">今日の分がまだ未回答です</div>
          <div class="alert-text">メイからの回答を待っています</div>
        </div>`;
    }
  }
}

async function markUrgentSeen(at) {
  const u = state.urgentCancels.find(x => x.at === at);
  if (u) {
    u.seen = true;
    await saveState();
    renderAll();
  }
}

// ===== メイ画面の今日カード =====
function renderTodayCard() {
  const now = new Date();
  const wd = ['日','月','火','水','木','金','土'][now.getDay()];
  document.getElementById('todayDate').textContent =
    `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} (${wd})`;

  const today = todayStr();
  const entry = state.schedule[today];

  document.querySelectorAll('#childView .answer-btn').forEach(b => b.classList.remove('selected'));
  if (entry) {
    document.querySelector(`#childView .answer-btn[data-answer="${entry.answer}"]`).classList.add('selected');
  }
}

async function selectAnswer(ans) {
  const today = todayStr();
  const existing = state.schedule[today] || {};
  const prev = existing.answer;
  state.schedule[today] = {
    answer: ans,
    author: state.currentUserId,
    updatedAt: new Date().toISOString()
  };
  document.querySelectorAll('#childView .answer-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`#childView .answer-btn[data-answer="${ans}"]`).classList.add('selected');
  await saveState();
  showToast(ans === 'yes' ? 'いる!で保存したよ' : 'いらないで保存したよ');
  renderAlerts();
  // 答えの切替通知（7日以内の日付のみ対象。今日は含む）
  if (prev && prev !== ans) {
    await notifyAnswerFlip([{ ds: today, from: prev, to: ans, kind: 'schedule' }]);
  }
}

// ===== 緊急キャンセル =====
async function sendUrgentCancel() {
  if (!confirm('ちっちに「今日の晩ごはんいらない」と緊急連絡を送りますか?')) return;
  const today = todayStr();
  state.schedule[today] = {
    answer: 'no',
    author: state.currentUserId,
    updatedAt: new Date().toISOString(),
    urgent: true
  };
  state.urgentCancels.push({
    date: today,
    author: state.currentUserId,
    at: new Date().toISOString(),
    seen: false
  });
  await saveState();
  showToast('⚡ ちっちに連絡したよ');
  // プッシュ通知（ちっち父向け）をキューに登録
  await queueNotification({
    type: 'urgent',
    targetRole: 'parent',
    title: '⚡ 緊急連絡',
    body: 'メイから緊急連絡：今日やっぱりいらない',
    ts: Date.now()
  });
  renderAll();
}

// ===== カレンダー =====
function changeMonth(delta) {
  state.calView.setMonth(state.calView.getMonth() + delta);
  renderCalendar(state.role);
}

function renderCalendar(which) {
  const y = state.calView.getFullYear();
  const m = state.calView.getMonth();
  const gridId = which === 'parent' ? 'calGridParent' : 'calGrid';
  const monthId = which === 'parent' ? 'calMonthParent' : 'calMonth';
  const monthEl = document.getElementById(monthId);
  const grid = document.getElementById(gridId);
  if (!grid || !monthEl) return;
  monthEl.textContent = `${y}年 ${m+1}月`;

  const first = new Date(y, m, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = todayStr();
  const todayDate = new Date();
  todayDate.setHours(0,0,0,0);

  grid.innerHTML = '';

  for (let i = 0; i < startWeekday; i++) {
    const d = document.createElement('div');
    d.className = 'cal-day empty';
    grid.appendChild(d);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(y, m, day);
    const ds = fmtDate(d);
    const entry = state.schedule[ds];
    const pm = state.parentMemo[ds];
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if (d < todayDate) cell.classList.add('past');
    if (ds === today) cell.classList.add('today');
    if (entry) cell.classList.add(entry.answer);
    if (state.bulkMode && state.bulkSelected.has(ds)) cell.classList.add('bulk-selected');

    cell.innerHTML = `<span>${day}</span>`;
    if (entry) {
      const mark = document.createElement('span');
      mark.className = 'mark';
      mark.textContent = entry.answer === 'yes' ? '○' : '✕';
      cell.appendChild(mark);
    }
    if (pm && pm.unavailable) {
      const np = document.createElement('span');
      np.className = 'noprep-mark';
      np.textContent = '×';
      cell.appendChild(np);
    }
    cell.onclick = () => onCalCellClick(ds);
    grid.appendChild(cell);
  }
}

function onCalCellClick(ds) {
  if (state.bulkMode) {
    if (state.bulkSelected.has(ds)) state.bulkSelected.delete(ds);
    else state.bulkSelected.add(ds);
    renderCalendar(state.role);
    updateBulkBar();
  } else {
    openDayModal(ds);
  }
}

// ===== 複数選択モード =====
function toggleBulkMode(which) {
  if (state.bulkMode === which) {
    // 解除
    state.bulkMode = null;
    state.bulkSelected.clear();
  } else {
    state.bulkMode = which;
    state.bulkSelected.clear();
  }
  const btnId = which === 'child' ? 'childBulkBtn' : 'parentBulkBtn';
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.toggle('on', state.bulkMode === which);
  renderCalendar(state.role);
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const countEl = document.getElementById('bulkCount');
  const btnsEl = document.getElementById('bulkButtons');
  if (!state.bulkMode) {
    bar.classList.remove('show');
    return;
  }
  bar.classList.add('show');
  countEl.textContent = `${state.bulkSelected.size}日選択中`;
  if (state.bulkMode === 'child') {
    btnsEl.innerHTML = `
      <button class="primary-yes" onclick="applyBulk('yes')">🍽️ いる全部</button>
      <button class="primary-no" onclick="applyBulk('no')">🙅 いらない全部</button>
      <button class="cancel" onclick="cancelBulk()">やめる</button>
    `;
  } else {
    btnsEl.innerHTML = `
      <button class="primary-noprep" onclick="applyBulkParent(true)">🍳 作れない全部</button>
      <button class="primary-available" onclick="applyBulkParent(false)">解除</button>
      <button class="cancel" onclick="cancelBulk()">やめる</button>
    `;
  }
}

async function applyBulk(ans) {
  if (state.bulkSelected.size === 0) { showToast('日付を選んでね'); return; }
  const flips = [];
  const nowIso = new Date().toISOString();
  state.bulkSelected.forEach(ds => {
    const existing = state.schedule[ds] || {};
    if (existing.answer && existing.answer !== ans) {
      flips.push({ ds, from: existing.answer, to: ans, kind: 'schedule' });
    }
    state.schedule[ds] = {
      answer: ans,
      author: state.currentUserId,
      updatedAt: nowIso
    };
  });
  const cnt = state.bulkSelected.size;
  state.bulkMode = null;
  state.bulkSelected.clear();
  document.getElementById('childBulkBtn')?.classList.remove('on');
  await saveState();
  renderAll();
  showToast(`${cnt}日分を「${ans === 'yes' ? 'いる' : 'いらない'}」にしたよ`);
  if (flips.length) await notifyAnswerFlip(flips);
}

async function applyBulkParent(unavailable) {
  if (state.bulkSelected.size === 0) { showToast('日付を選んでね'); return; }
  const flips = [];
  const nowIso = new Date().toISOString();
  state.bulkSelected.forEach(ds => {
    const existing = state.parentMemo[ds] || {};
    const prevState = !!existing.unavailable;
    if (prevState !== unavailable) {
      flips.push({ ds, from: prevState, to: unavailable, kind: 'parent' });
    }
    if (unavailable) {
      state.parentMemo[ds] = {
        unavailable: true,
        author: state.currentUserId,
        updatedAt: nowIso
      };
    } else {
      // 解除
      delete state.parentMemo[ds];
    }
  });
  const cnt = state.bulkSelected.size;
  state.bulkMode = null;
  state.bulkSelected.clear();
  document.getElementById('parentBulkBtn')?.classList.remove('on');
  await saveState();
  renderAll();
  showToast(`${cnt}日分を「${unavailable ? '作れない日' : '作れる日'}」にしたよ`);
  if (flips.length) await notifyAnswerFlip(flips);
}

function cancelBulk() {
  state.bulkMode = null;
  state.bulkSelected.clear();
  document.getElementById('childBulkBtn')?.classList.remove('on');
  document.getElementById('parentBulkBtn')?.classList.remove('on');
  renderCalendar(state.role);
  updateBulkBar();
}

// ===== 日付詳細モーダル =====
function openDayModal(ds) {
  const d = parseDate(ds);
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('modalDate').textContent = `${d.getMonth()+1}月${d.getDate()}日 (${wd})`;
  const entry = state.schedule[ds] || {};
  const pm = state.parentMemo[ds] || {};
  const isPast = parseDate(ds) < new Date(new Date().setHours(0,0,0,0));

  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="memo-label">🧒 メイの回答</div>
    <div class="answer-buttons">
      <button class="answer-btn yes ${entry.answer==='yes'?'selected':''}" onclick="modalSelectAnswer('${ds}','yes')">
        <span class="emoji">🍽️</span>
        <span>いる</span>
      </button>
      <button class="answer-btn no ${entry.answer==='no'?'selected':''}" onclick="modalSelectAnswer('${ds}','no')">
        <span class="emoji">🙅</span>
        <span>いらない</span>
      </button>
    </div>
    ${entry.author ? `<div class="msg-author">最終更新: ${getUserName(entry.author)}</div>` : ''}
    <button class="save-btn" onclick="modalSave('${ds}')">メイの回答を保存</button>
    ${entry.answer ? `<button class="save-btn" style="background:#999;margin-top:6px;" onclick="modalDelete('${ds}')">この日の回答を消す</button>` : ''}

    <div style="margin-top:18px; padding-top:14px; border-top:1.5px dashed var(--leaf-dark);">
      <div class="memo-label" style="margin-bottom:6px;">👨‍👩 ちっちから</div>
      <label class="noprep-toggle ${pm.unavailable?'on':''}" id="modalNoprepToggle">
        <input type="checkbox" id="modalNoprepCheck" ${pm.unavailable?'checked':''} onchange="onModalNoprepChange(event)">
        <span>🍳 この日は作れない</span>
      </label>
      <button class="save-btn" onclick="modalSaveParent('${ds}')">ちっちの情報を保存</button>
    </div>
    ${isPast ? '<div class="msg-author" style="margin-top:10px;">⚠️ 過去の日付です</div>' : ''}
  `;
  document.getElementById('dayModal').classList.add('show');
  // モーダル内モード状態のローカル保持用
  window._modalPending = { ds, pendingAnswer: entry.answer || null };
}

function modalSelectAnswer(ds, ans) {
  window._modalPending = window._modalPending || { ds };
  window._modalPending.pendingAnswer = ans;
  // UI 反映
  document.querySelectorAll('#modalBody .answer-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`#modalBody .answer-btn.${ans}`)?.classList.add('selected');
}

function onModalNoprepChange(ev) {
  const toggle = document.getElementById('modalNoprepToggle');
  toggle.classList.toggle('on', ev.target.checked);
}

async function modalSave(ds) {
  const pending = window._modalPending || {};
  if (!pending.pendingAnswer) {
    showToast('まず「いる」か「いらない」を選んでね');
    return;
  }
  const existing = state.schedule[ds] || {};
  const prev = existing.answer;
  const ans = pending.pendingAnswer;
  state.schedule[ds] = {
    answer: ans,
    author: state.currentUserId,
    updatedAt: new Date().toISOString()
  };
  await saveState();
  closeModal();
  renderAll();
  showToast('保存したよ ✓');
  if (prev && prev !== ans) {
    await notifyAnswerFlip([{ ds, from: prev, to: ans, kind: 'schedule' }]);
  }
}

async function modalDelete(ds) {
  if (!confirm('この日の回答を消しますか?')) return;
  delete state.schedule[ds];
  await saveState();
  closeModal();
  renderAll();
  showToast('削除したよ');
}

async function modalSaveParent(ds) {
  const unavailable = document.getElementById('modalNoprepCheck').checked;
  const existing = state.parentMemo[ds] || {};
  const prev = !!existing.unavailable;
  if (!unavailable) {
    delete state.parentMemo[ds];
  } else {
    state.parentMemo[ds] = {
      unavailable: true,
      author: state.currentUserId,
      updatedAt: new Date().toISOString()
    };
  }
  await saveState();
  closeModal();
  renderAll();
  showToast(unavailable ? '🍳 作れない日で保存' : '解除したよ');
  if (prev !== unavailable) {
    await notifyAnswerFlip([{ ds, from: prev, to: unavailable, kind: 'parent' }]);
  }
}

function closeModal() {
  document.getElementById('dayModal').classList.remove('show');
  window._modalPending = null;
}

// ===== ちっち画面 =====
async function onTodayNoprepChange(ev) {
  const willBe = ev.target.checked;
  const toggle = document.getElementById('todayNoprepToggle');
  toggle.classList.toggle('on', willBe);
  const today = todayStr();
  const existing = state.parentMemo[today] || {};
  const prev = !!existing.unavailable;
  if (!willBe) {
    delete state.parentMemo[today];
  } else {
    state.parentMemo[today] = {
      unavailable: true,
      author: state.currentUserId,
      updatedAt: new Date().toISOString()
    };
  }
  await saveState();
  renderAlerts();
  renderCalendar('parent');
  showToast(willBe ? '🍳 作れない日にしたよ' : '✓ 解除したよ');
  if (prev !== willBe) {
    await notifyAnswerFlip([{ ds: today, from: prev, to: willBe, kind: 'parent' }]);
  }
}

function renderParentView() {
  const today = todayStr();
  const entry = state.schedule[today];

  // 今日の状況カード
  const card = document.getElementById('parentTodayCard');
  const now = new Date();
  const wd = ['日','月','火','水','木','金','土'][now.getDay()];
  let html = `<div class="today-date">${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} (${wd})</div>`;
  if (entry) {
    const label = entry.answer === 'yes' ? '🍽️ いる' : '🙅 いらない';
    const color = entry.answer === 'yes' ? 'var(--leaf)' : 'var(--tomato)';
    html += `<div class="today-question" style="color:${color};">${label}</div>`;
    html += `<div class="msg-author" style="margin-top:8px;">入力者: ${getUserName(entry.author)}</div>`;
  } else {
    html += `<div class="today-question" style="color:#999;">まだ未回答</div>`;
  }
  card.innerHTML = html;

  // 「今日は作れない」トグル状態反映
  const pm = state.parentMemo[today];
  const noprepCheck = document.getElementById('todayNoprepCheck');
  const noprepToggle = document.getElementById('todayNoprepToggle');
  if (noprepCheck && noprepToggle) {
    const isNoprep = !!(pm && pm.unavailable);
    noprepCheck.checked = isNoprep;
    noprepToggle.classList.toggle('on', isNoprep);
  }

  // 14日間予定
  const listEl = document.getElementById('scheduleList');
  listEl.innerHTML = '';
  for (let i = 0; i < 14; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const ds = fmtDate(d);
    const e = state.schedule[ds];
    const dayPm = state.parentMemo[ds];
    const weekday = ['日','月','火','水','木','金','土'][d.getDay()];
    const div = document.createElement('div');
    div.className = 'schedule-item ' + (e ? e.answer : 'empty');
    if (i === 0) div.classList.add('today');
    if (dayPm && dayPm.unavailable) div.classList.add('noprep');

    let status = '<span class="schedule-status empty">未入力</span>';
    if (e) {
      status = e.answer === 'yes'
        ? '<span class="schedule-status yes">いる 🍽️</span>'
        : '<span class="schedule-status no">いらない 🙅</span>';
    }
    let memoHtml = '';
    if (dayPm && dayPm.unavailable) {
      memoHtml += `<div class="schedule-noprep-label">🍳 作れない日</div>`;
    }
    div.innerHTML = `
      <div class="schedule-date">
        <div class="day">${d.getDate()}</div>
        <div>${d.getMonth()+1}月${weekday}</div>
      </div>
      <div class="schedule-content">
        ${status}
        ${memoHtml}
      </div>
      <div></div>
    `;
    div.onclick = () => openDayModal(ds);
    listEl.appendChild(div);
  }
}

// ===== ユーザー管理 =====
function openUserManage() {
  renderUserList();
  document.getElementById('userModal').classList.add('show');
}
function closeUserModal() {
  document.getElementById('userModal').classList.remove('show');
}
function renderUserList() {
  const el = document.getElementById('userList');
  el.innerHTML = '<div class="memo-label">登録メンバー</div>';
  state.users.forEach(u => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:8px;align-items:center;padding:8px;background:#fff;border:1.5px solid var(--ink);border-radius:8px;margin-bottom:6px;';
    row.innerHTML = `
      <span style="flex:1;font-weight:700;">${u.name.replace(/</g,'&lt;')}</span>
      ${state.users.length > 1 ? `<button style="border:1.5px solid var(--ink);background:var(--tomato);color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-family:inherit;font-weight:700;cursor:pointer;" onclick="removeUser('${u.id}')">削除</button>` : ''}
    `;
    el.appendChild(row);
  });
}
async function addUser() {
  const name = document.getElementById('newUserInput').value.trim();
  if (!name) { showToast('名前を入れてね'); return; }
  state.users.push({ id: uuid(), name });
  await saveState();
  document.getElementById('newUserInput').value = '';
  renderUserList();
  renderUserSelect();
  showToast(name + 'さんを追加したよ');
}
async function removeUser(id) {
  if (state.users.length <= 1) { showToast('最低1人は必要だよ'); return; }
  const u = state.users.find(x => x.id === id);
  if (!confirm((u?.name || '') + 'さんを削除しますか?')) return;
  state.users = state.users.filter(x => x.id !== id);
  if (state.currentUserId === id) {
    state.currentUserId = state.users[0].id;
    saveCurrentUser();
  }
  // tokenも掃除
  if (state.tokens[id]) delete state.tokens[id];
  await saveState();
  renderUserList();
  renderUserSelect();
  renderAll();
}

// ===== プッシュ通知（FCM） =====
// ブラウザ権限状態に応じてバナーを出し、許可もらえたらトークン保存
function updateNotifBanner() {
  const banner = document.getElementById('notifBanner');
  if (!banner) return;
  if (!('Notification' in window)) { banner.classList.add('hidden'); return; }
  if (!window.__fb || !window.__fb.messaging) { banner.classList.add('hidden'); return; }
  const me = getCurrentUser();
  if (!me) { banner.classList.add('hidden'); return; }
  const hasToken = !!state.tokens[me.id];
  if (Notification.permission === 'granted' && hasToken) {
    banner.classList.add('hidden');
  } else {
    banner.classList.remove('hidden');
  }
}

// VAPID 公開鍵は Firebase Console → Cloud Messaging → Web設定 で取得して下記に貼る
// （未設定でも他機能は動作する）
const VAPID_KEY = ""; // TODO: ペーストする

async function requestNotifPermission() {
  if (!('Notification' in window)) { showToast('このブラウザは通知非対応'); return; }
  if (!window.__fb || !window.__fb.messaging) {
    showToast('このブラウザ/OSは通知非対応');
    return;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { showToast('通知が許可されませんでした'); return; }
    if (!VAPID_KEY) {
      showToast('通知キー未設定（VAPID_KEY）');
      return;
    }
    const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
    const { messaging, getToken, onMessage } = window.__fb;
    const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
    if (!token) { showToast('トークン取得失敗'); return; }
    const me = getCurrentUser();
    state.tokens[me.id] = { token, updatedAt: Date.now(), role: me.role || null };
    await saveState();
    // 前景通知
    onMessage(messaging, (payload) => {
      const title = payload?.notification?.title || 'お知らせ';
      const body = payload?.notification?.body || '';
      showToast(`🔔 ${title}: ${body}`);
    });
    updateNotifBanner();
    showToast('🔔 通知を有効にしました');
  } catch(e) {
    showToast('通知設定エラー: ' + e.message);
  }
}

// 変更通知：キューに追加しておき、サーバー側のスケジューラやCF Workersから送る設計
// （ここではFirestoreに「送信待ち」として記録するだけ）
async function queueNotification(payload) {
  try {
    await waitForFirebase();
    const { db, setDoc } = window.__fb;
    const { doc } = await import("https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js");
    const id = 'n_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    await setDoc(doc(db, "notifications", id), { ...payload, createdAt: Date.now(), sent: false });
  } catch(e) {
    // 通知は補助機能なので失敗してもアプリは動作
    console.warn('queueNotification failed', e);
  }
}

async function notifyAnswerFlip(flips) {
  // 今日～7日先のみ対象にフィルタ
  const today = new Date(); today.setHours(0,0,0,0);
  const limit = new Date(today); limit.setDate(today.getDate() + 7);
  const valid = flips.filter(f => {
    const d = parseDate(f.ds);
    return d >= today && d <= limit;
  });
  if (valid.length === 0) return;

  // 相手役割を判定（自分がchildなら親へ、自分がparentなら子へ）
  const me = getCurrentUser();
  let targetRole;
  if (me?.role === 'child') targetRole = 'parent';
  else if (me?.role === 'parent') targetRole = 'child';
  else targetRole = state.role === 'child' ? 'parent' : 'child';

  let title, body;
  if (valid.length === 1) {
    const f = valid[0];
    const d = parseDate(f.ds);
    const md = `${d.getMonth()+1}/${d.getDate()}`;
    if (f.kind === 'schedule') {
      const fromTxt = f.from === 'yes' ? 'いる' : 'いらない';
      const toTxt = f.to === 'yes' ? 'いる' : 'いらない';
      title = `${me.name || '誰か'}が予定更新`;
      body = `${md}: ${fromTxt} → ${toTxt}`;
    } else {
      const toTxt = f.to ? '作れない日' : '作れる日に戻した';
      title = `${me.name || '誰か'}が予定更新`;
      body = `${md}: ${toTxt}`;
    }
  } else {
    title = `${me.name || '誰か'}が予定を更新`;
    body = `${valid.length}日分の予定を変更したよ`;
  }

  await queueNotification({
    type: 'flip',
    targetRole,
    title,
    body,
    flips: valid,
    ts: Date.now(),
    by: me?.id || null
  });
}

// ===== 起動 =====
init().then(() => {
  waitForFirebase().then(() => {
    const { stateDoc, onSnapshot } = window.__fb;
    onSnapshot(stateDoc, (snap) => {
      if (!snap.exists()) return;
      const data = snap.data();
      const prev = JSON.stringify({s: state.schedule, p: state.parentMemo, u: state.urgentCancels, users: state.users, t: state.tokens});
      state.users = data.users || [];
      state.schedule = data.schedule || {};
      state.parentMemo = data.parentMemo || {};
      state.urgentCancels = data.urgentCancels || [];
      state.tokens = data.tokens || {};
      const next = JSON.stringify({s: state.schedule, p: state.parentMemo, u: state.urgentCancels, users: state.users, t: state.tokens});
      if (prev !== next) {
        renderUserSelect();
        renderAll();
        updateNotifBanner();
      }
      setSyncStatus('☁ 同期OK ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}));
    }, (err) => { setSyncStatus('⚠ 同期エラー', true); });
  });
});

// Service Worker 登録（PWAシェル）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
